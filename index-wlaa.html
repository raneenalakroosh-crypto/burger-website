<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Burgirto Menu</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark">

  <!-- Language -->
  <div class="lang-switch">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ar')">AR</button>
  </div>

  <!-- Loyalty -->
  <div class="loyalty-box">
    <h3 id="loyaltyTitle">نقاط الولاء</h3>
    <input id="phoneInput" type="text" placeholder="رقم الجوال">
    <button id="showBtn" onclick="showPoints()">عرض النقاط</button>
    <p id="pointsResult"></p>
  </div>

  <!-- Hero Image -->
  <div class="hero">
    <div class="hero-placeholder">
      ضع صورة هنا
    </div>
  </div>

  <!-- Menu Title -->
  <h2 id="menuTitle" class="menu-title">المنيو</h2>

  <!-- Menu -->
  <div id="menu" class="menu-grid"></div>

  <script src="js/menu.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/loyalty.js"></script>
</body>
</html>
